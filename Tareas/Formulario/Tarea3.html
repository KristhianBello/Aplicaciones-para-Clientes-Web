<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Clientes</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <form action="" method="get">
        <div class="container">
            <h2>Registro de Clientes</h2>
        </div>
        <label>Cedula:</label>
        <input type="text" placeholder="Cedula" autofocus required /><br>
        <label>Apellidos:</label>
        <input type="text" placeholder="Apellidos" required><br>
        <label>Nombres:</label>
        <input type="text" placeholder="Nombres" required><br>
        <label>Dirección:</label>
        <input type="text" placeholder="Dirección"><br>
        <label>Teléfono:</label>
        <input type="tel" placeholder="Teléfono"><br>
        <label>E-mail:</label>
        <input type="email" placeholder="E-mail" required><br>

        <form action="#">
        <label for="lang">Ciudad</label>
        <select name="Ciudad" id="lang">
          <option value="Elegir">Elige:</option>
          <option value="Manta">Manta</option>
          <option value="Portoviejo">Portoviejo</option>
          <option value="El carmen">El Carmen</option>
          <option value="Chone">Chone</option>
          <option value="Calceta">Calceta</option>
          <option value="Alfaro">Alfaro</option>
          <option value="Jipijapa">Jipijapa</option>
          <option value="Jaramijo">Jaramijo</option>
        </select>
        <p>
            <input type="submit" value="Enviar" />
        </p>
        </form>    
    </form>
</body>
</html>
