<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="style1.css">
    <<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="title">Registro de Clientes</div>
            <form action="#">
                <div class="group"></div>
                    <label>Cedula: </label>
                    <input type="text" placeholder="Cedula" autofocus required/> <br>
                    <label>Apellidos: </label>
                    <input type="text" placeholder="Apellidos" required><br>
                    <label>Nombres: </label>
                    <input type="text" placeholder="Nombres" required><br>
                    <label>Dirección: </label>
                    <input type="text" placeholder="Dirección"><br>
                    <label>Teléfono: </label>
                    <input type="number" placeholder="Teléfono"><br>
                    <label>E-mail: </label>
                    <input type="email" placeholder="E-mail" required><br>
                
                    <div class="ciudad">
                        <label for="ciudad">Ciudad
                            <select name="Ciudad" id="city">
                                <option value="Elegir">Elige:</option>
                                <option value="Manta">Manta</option>
                                <option value="Portoviejo">Portoviejo</option>
                                <option value="El carmen">El Carmen</option>
                                <option value="Chone">Chone</option>
                                <option value="Calceta">Calceta</option>
                                <option value="Alfaro">Alfaro</option>
                                <option value="Jipijapa">Jipijapa</option>
                                <option value="Jaramijo">Jaramijo</option>
                            </select>
                        </label>
                    </div>      
                    <div class="button">
                        <input type="button" value="Registrar">
                    </div>
            </form>
    </div>
</body>
</html>
